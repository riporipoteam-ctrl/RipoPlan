<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RipoPlan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Authentication section (signup / login) -->
    <div id="auth-section" class="container">
      <h1 class="logo">RipoPlan</h1>
      <div id="signup" class="auth-form">
        <h2>Create Account</h2>
        <form id="signup-form">
          <input
            type="email"
            id="signup-email"
            placeholder="Email"
            required
          />
          <input
            type="password"
            id="signup-password"
            placeholder="Password"
            required
          />
          <button type="submit">Sign Up</button>
        </form>
        <p class="switch">
          Already have an account?
          <a href="#" id="show-login">Log in</a>
        </p>
      </div>
      <div id="login" class="auth-form hidden">
        <h2>Log In</h2>
        <form id="login-form">
          <input
            type="email"
            id="login-email"
            placeholder="Email"
            required
          />
          <input
            type="password"
            id="login-password"
            placeholder="Password"
            required
          />
          <button type="submit">Log In</button>
        </form>
        <p class="switch">
          Don't have an account?
          <a href="#" id="show-signup">Sign up</a>
        </p>
      </div>
    </div>

    <!-- Main app section -->
    <div id="app" class="hidden">
      <header>
        <h1>RipoPlan Tasks</h1>
        <button id="logout">Log out</button>
      </header>
      <section id="new-task" class="card">
        <h2>Create a New Task</h2>
        <form id="new-task-form">
          <input
            type="text"
            id="new-title"
            placeholder="Task title"
            required
          />
          <textarea
            id="new-desc"
            placeholder="Description (optional)"
            rows="3"
          ></textarea>
          <input type="date" id="new-due" />
          <button type="submit">Add Task</button>
        </form>
      </section>
      <section id="suggestions" class="card">
        <h2>Suggestions</h2>
        <ul id="suggestions-list"></ul>
      </section>
      <section id="tasks" class="card">
        <h2>Your Tasks</h2>
        <ul id="tasks-list"></ul>
      </section>
    </div>
    <script src="script.js"></script>
  </body>
</html>
