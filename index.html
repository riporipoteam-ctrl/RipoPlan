<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RipoPlan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="auth-section" class="container">
      <h1 class="logo">RipoPlan</h1>
      <div id="signup" class="auth-form">
        <h2>Create Account</h2>
        <form id="signup-form">
          <input type="email" id="signup-email" placeholder="Email" required />
          <input type="password" id="signup-password" placeholder="Password" required />
          <button type="submit">Sign Up</button>
        </form>
        <p class="switch">Already have an account? <a href="#" id="show-login">Log in</a></p>
      </div>
      <div id="login" class="auth-form hidden">
        <h2>Log In</h2>
        <form id="login-form">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Password" required />
          <button type="submit">Log In</button>
        </form>
        <p class="switch">Don't have an account? <a href="#" id="show-signup">Sign up</a></p>
      </div>
    </div>

    <div id="app" class="hidden">
      <header>
        <h1>RipoPlan Vehicle Assistant</h1>
        <div class="header-actions">
          <button id="settings-toggle">Settings</button>
          <button id="logout">Log out</button>
        </div>
      </header>

      <section id="settings-panel" class="card hidden">
        <h2>Settings</h2>
        <label class="switch-inline">
          Theme
          <select id="theme-select">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
      </section>

      <section id="scanner" class="card">
        <h2>Post-scan lookup</h2>
        <div class="row">
          <input id="vin-input" type="text" placeholder="Enter VIN" />
          <button id="load-vehicle">Open vehicle details</button>
          <button id="print-report">Print report</button>
        </div>
      </section>

      <section id="vehicle-details" class="card hidden">
        <div id="hero" class="hero"></div>
        <div class="detail-grid">
          <div class="panel"><h3>Specs</h3><ul id="specs-list"></ul></div>
          <div class="panel"><h3>Known issues</h3><ul id="issues-list"></ul></div>
          <div class="panel"><h3>Diagnostics</h3><ul id="diagnostics-list"></ul></div>
          <div class="panel"><h3>Recommended fixes</h3><ul id="fixes-list"></ul></div>
        </div>
      </section>

      <section class="card">
        <h2>VIN-scoped chat timeline</h2>
        <div id="chat-timeline"></div>
        <form id="chat-form" class="row">
          <input id="chat-input" type="text" placeholder="Ask for diagnostic guidance" required />
          <button type="submit">Send</button>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
