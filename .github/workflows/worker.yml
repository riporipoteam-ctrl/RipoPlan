name: Deploy Cloudflare Worker

# Deploys the AgentNexus backend Worker to Cloudflare on every change.
# One-time setup (repo Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   (required — "Edit Cloudflare Workers" template)
#   CLOUDFLARE_ACCOUNT_ID  (required)
#   NVIDIA_API_KEY         (optional — enables NVIDIA models)
#   GROQ_API_KEY           (optional — proxy Groq through the Worker)
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET (optional — Gmail/Google OAuth)

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      # Diagnostic: shows exactly which account(s) the token can access + their IDs.
      - name: Who am I (diagnostic)
        run: npx wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # NOTE: CLOUDFLARE_ACCOUNT_ID is intentionally NOT passed — wrangler
      # auto-detects the account from the token. A wrong/stale ACCOUNT_ID secret
      # was overriding it and causing API error 7003.
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Worker secrets (only those provided)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          put() { if [ -n "$2" ]; then echo "$2" | npx wrangler secret put "$1"; fi; }
          put NVIDIA_API_KEY "$NVIDIA_API_KEY"
          put GROQ_API_KEY "$GROQ_API_KEY"
          put GOOGLE_CLIENT_ID "$GOOGLE_CLIENT_ID"
          put GOOGLE_CLIENT_SECRET "$GOOGLE_CLIENT_SECRET"
          put SUPABASE_SERVICE_KEY "$SUPABASE_SERVICE_KEY"
