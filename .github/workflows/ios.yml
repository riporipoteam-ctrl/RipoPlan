name: Build iOS app (.ipa)

# Builds the REAL native SwiftUI app (ios-native/) into a sideloadable .ipa on a
# free GitHub-hosted macOS runner — no Mac needed on your end. It also boots the
# iOS Simulator and captures a real screenshot of the native app running.
#
# Outputs:
#   • Artifacts: "AskAI-ipa" (the .ipa) and "AskAI-ios-screenshot".
#   • A rolling "ios-latest" pre-release with the .ipa attached, so you can grab
#     it straight on your iPhone and sideload with AltStore / Sideloadly
#     (they re-sign it with your own free Apple ID).
on:
  push:
    branches: [main]
    paths:
      - "ios-native/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ipa:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios-native
        run: xcodegen generate
      - name: Build (unsigned, device)
        working-directory: ios-native
        run: |
          set -o pipefail
          xcodebuild \
            -project AskAI.xcodeproj -scheme AskAI -configuration Release \
            -sdk iphoneos -destination 'generic/platform=iOS' -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build
      - name: Package .ipa
        working-directory: ios-native
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          echo "App: $APP"
          rm -rf Payload AskAI-unsigned.ipa
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -qry AskAI-unsigned.ipa Payload
          ls -lh AskAI-unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: AskAI-ipa
          path: ios-native/AskAI-unsigned.ipa
          if-no-files-found: error
      - name: Publish to rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: AskAI iOS (latest)
          prerelease: true
          body: |
            Unsigned **AskAI.ipa** built from the native SwiftUI app.
            Sideload with AltStore or Sideloadly (re-signs with your own Apple ID).
          files: ios-native/AskAI-unsigned.ipa

  screenshot:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios-native
        run: xcodegen generate
      - name: Build for Simulator
        working-directory: ios-native
        run: |
          xcodebuild \
            -project AskAI.xcodeproj -scheme AskAI -configuration Debug \
            -sdk iphonesimulator -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO build
      - name: Boot Simulator, launch app, capture screenshot
        run: |
          DEV="iPhone 16 Pro"
          xcrun simctl boot "$DEV" || true
          sleep 8
          APP=$(find ios-native/dd/Build/Products -name "AskAI.app" -type d | head -1)
          echo "App: $APP"
          xcrun simctl install booted "$APP"
          xcrun simctl launch booted gg.askai.app || true
          sleep 14
          xcrun simctl io booted screenshot askai-ios.png
          ls -lh askai-ios.png
      - uses: actions/upload-artifact@v4
        with:
          name: AskAI-ios-screenshot
          path: askai-ios.png
          if-no-files-found: error
