name: Build iOS IPA

# Builds an UNSIGNED .ipa of AgentNexus (download from Artifacts, install with
# Sideloadly) AND captures a REAL screenshot of the app running in the iOS
# Simulator. Run from the Actions tab → "Build iOS IPA" → Run workflow.

on:
  workflow_dispatch:

jobs:
  ipa:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build web (Capacitor target) + sync iOS
        run: |
          CAP_BUILD=1 npx next build
          npx cap add ios || true
          npx cap sync ios
      - name: Archive (unsigned)
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Release \
            -sdk iphoneos -archivePath "$PWD/build/App.xcarchive" archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER=""
      - name: Package unsigned IPA
        working-directory: ios/App
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r AgentNexus-unsigned.ipa Payload >/dev/null && ls -lh AgentNexus-unsigned.ipa
      - uses: actions/upload-artifact@v4
        with:
          name: AgentNexus-iOS-ipa
          path: ios/App/build/AgentNexus-unsigned.ipa
          if-no-files-found: error

  screenshot:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build web (Capacitor target) + sync iOS
        run: |
          CAP_BUILD=1 npx next build
          npx cap add ios || true
          npx cap sync ios
      - name: Build app for Simulator
        working-directory: ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug \
            -sdk iphonesimulator -derivedDataPath dd build CODE_SIGNING_ALLOWED=NO
      - name: Boot Simulator, launch app, capture screenshot
        run: |
          DEV="iPhone 15 Pro"
          xcrun simctl boot "$DEV" || true
          sleep 8
          APP=$(find ios/App/dd/Build/Products -name "App.app" -type d | head -1)
          echo "App: $APP"
          xcrun simctl install booted "$APP"
          xcrun simctl launch booted gg.agentnexus.app || true
          sleep 12
          xcrun simctl io booted screenshot agentnexus-ios.png
          ls -lh agentnexus-ios.png
      - uses: actions/upload-artifact@v4
        with:
          name: AgentNexus-iOS-screenshot
          path: agentnexus-ios.png
          if-no-files-found: error
