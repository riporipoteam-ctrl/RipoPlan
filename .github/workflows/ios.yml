name: Build iOS IPA

# Builds an UNSIGNED .ipa of AgentNexus you can download from the run's
# Artifacts and install with Sideloadly (it re-signs with your Apple ID).
# Run it from the Actions tab → "Build iOS IPA" → Run workflow.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build web (Capacitor target) + sync iOS
        run: |
          CAP_BUILD=1 npx next build
          npx cap add ios || npx cap sync ios
          npx cap sync ios

      - name: Archive (unsigned)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/App.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        working-directory: ios/App
        run: |
          mkdir -p build/Payload
          cp -R build/App.xcarchive/Products/Applications/App.app build/Payload/
          cd build && zip -r AgentNexus-unsigned.ipa Payload >/dev/null
          ls -lh AgentNexus-unsigned.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: AgentNexus-iOS-ipa
          path: ios/App/build/AgentNexus-unsigned.ipa
          if-no-files-found: error
