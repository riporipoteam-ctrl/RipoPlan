name: Build iOS app (.ipa)

# Builds the REAL native SwiftUI app (ios-native/) into a sideloadable .ipa on a
# free GitHub-hosted macOS runner — no Mac needed on your end. It also boots the
# iOS Simulator and captures a real screenshot of the native app running.
#
# Outputs:
#   • Artifacts: "AskAI-ipa" (the .ipa) and "AskAI-ios-screenshot".
#   • A rolling "ios-latest" pre-release with the .ipa attached, so you can grab
#     it straight on your iPhone and sideload with AltStore / Sideloadly
#     (they re-sign it with your own free Apple ID).
on:
  push:
    branches: [main]
    paths:
      - "ios-native/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

permissions:
  contents: write

# A new run cancels any still-running one (frees a hung Simulator boot, saves minutes).
concurrency:
  group: ios-build
  cancel-in-progress: true

jobs:
  ipa:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios-native
        run: xcodegen generate
      - name: Build (unsigned, device)
        working-directory: ios-native
        run: |
          set -o pipefail
          xcodebuild \
            -project AskAI.xcodeproj -scheme AskAI -configuration Release \
            -sdk iphoneos -destination 'generic/platform=iOS' -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            clean build
      - name: Package .ipa (version-stamped)
        working-directory: ios-native
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          echo "App: $APP"
          VER="1.0.${{ github.run_number }}"
          BUILD="${{ github.run_number }}"
          # Stamp the version so the app knows it and auto-update can compare.
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VER" "$APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$APP/Info.plist" || true
          rm -rf Payload AskAI-unsigned.ipa
          mkdir -p Payload && cp -R "$APP" Payload/
          zip -qry AskAI-unsigned.ipa Payload
          ls -lh AskAI-unsigned.ipa
          echo "VER=$VER" >> "$GITHUB_ENV"
      - name: Generate SideStore/AltStore source
        working-directory: ios-native
        run: |
          SIZE=$(stat -f%z AskAI-unsigned.ipa 2>/dev/null || stat -c%s AskAI-unsigned.ipa)
          DATE=$(date -u +%Y-%m-%d)
          REPO="riporipoteam-ctrl/RipoPlan"
          DL="https://github.com/$REPO/releases/download/ios-latest/AskAI-unsigned.ipa"
          ICON="https://raw.githubusercontent.com/$REPO/main/ios-native/Resources/Assets.xcassets/AppIcon.appiconset/icon-1024.png"
          cat > altstore.json <<JSON
          {
            "name": "AskAI",
            "identifier": "gg.askai.source",
            "subtitle": "Your AI agent team — auto-updated.",
            "iconURL": "$ICON",
            "tintColor": "0D0D0D",
            "apps": [
              {
                "name": "AskAI",
                "bundleIdentifier": "gg.askai.app",
                "developerName": "AskAI",
                "subtitle": "Your AI agent team.",
                "localizedDescription": "AskAI — a native team of AI agents that chat, browse, build, and get work done. Auto-updates via this source.",
                "iconURL": "$ICON",
                "tintColor": "0D0D0D",
                "category": "productivity",
                "version": "$VER",
                "versionDate": "$DATE",
                "versionDescription": "Latest AskAI build (#${{ github.run_number }}).",
                "downloadURL": "$DL",
                "size": $SIZE
              }
            ],
            "news": []
          }
          JSON
          cat altstore.json
      - uses: actions/upload-artifact@v4
        with:
          name: AskAI-ipa
          path: ios-native/AskAI-unsigned.ipa
          if-no-files-found: error
      - name: Publish to rolling pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-latest
          name: AskAI iOS (latest)
          prerelease: true
          body: |
            Unsigned **AskAI.ipa** (v${{ env.VER }}) built from the native SwiftUI app.

            **Auto-update (recommended):** add this source in SideStore/AltStore once —
            `https://github.com/riporipoteam-ctrl/RipoPlan/releases/download/ios-latest/altstore.json`
            — then it updates itself. Or sideload the .ipa directly with Sideloadly.
          files: |
            ios-native/AskAI-unsigned.ipa
            ios-native/altstore.json

  screenshot:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios-native
        run: xcodegen generate
      - name: Build for Simulator
        working-directory: ios-native
        run: |
          xcodebuild \
            -project AskAI.xcodeproj -scheme AskAI -configuration Debug \
            -sdk iphonesimulator -derivedDataPath dd \
            CODE_SIGNING_ALLOWED=NO build
      - name: Boot Simulator, launch app, capture screenshot
        run: |
          set -x
          # Pick a concrete available iPhone simulator and boot it by UDID.
          UDID=$(xcrun simctl list devices available | grep -Eo '[0-9A-F-]{36}' | head -1)
          if [ -z "$UDID" ]; then echo "No simulator available"; xcrun simctl list devices; exit 1; fi
          echo "Using simulator $UDID"
          xcrun simctl bootstatus "$UDID" -b || xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" || true
          APP=$(find ios-native/dd/Build/Products -name "AskAI.app" -type d | head -1)
          echo "App: $APP"
          xcrun simctl install "$UDID" "$APP"
          xcrun simctl launch "$UDID" gg.askai.app || true
          # Give the WKWebView time to load the live site, then snapshot.
          sleep 16
          xcrun simctl io "$UDID" screenshot askai-ios.png
          ls -lh askai-ios.png
      - uses: actions/upload-artifact@v4
        with:
          name: AskAI-ios-screenshot
          path: askai-ios.png
          if-no-files-found: error
