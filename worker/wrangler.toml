name = "agentnexus-backend"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# Run the background task queue every minute so agents keep working with the app closed.
[triggers]
crons = ["* * * * *"]

# Secrets (set via the deploy workflow or `wrangler secret put <NAME>`):
#   OLLAMA_API_KEY          - hosted Ollama API key (serves the GLM chat model)
#   NVIDIA_API_KEY          - https://build.nvidia.com (image gen + chat fallback)
#   SUPABASE_SERVICE_KEY    - Supabase service role key (cron reads/writes, bypassing RLS)
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET - Gmail sign-in
#   GROQ_API_KEY            - (optional)
#
# Vars below are safe to commit:
[vars]
ALLOWED_ORIGIN = "*"
APP_REDIRECT = "https://riporipoteam-ctrl.github.io/RipoPlan/oauth/"
SUPABASE_URL = "https://xbwhvkzgbnyqsjplbyox.supabase.co"
AGENT_MODEL = "glm-5.2"
OLLAMA_BASE = "https://ollama.com"

# Real headless-Chrome live browser for every agent. Requires a Workers Paid plan.
# Enable it by uncommenting the binding below, then redeploy; the worker falls
# back to server-side fetch when it's absent.
# [browser]
# binding = "BROWSER"
