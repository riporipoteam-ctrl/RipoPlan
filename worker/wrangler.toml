# Deploy INTO the existing, already-working "ripoai-nvidia" worker (creating a
# brand-new worker fails with API error 7003 on this token). The app's BACKEND_URL
# already points here, so updating it lights up search/browse/tasks/Gmail with no
# extra config. This code is a superset (chat + image + browse + tasks + oauth).
name = "ripoai-nvidia"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# GLM-5.2 runs on Cloudflare's own GPUs via Workers AI — no external host, no
# Ollama, no extra API key. Uses your account's Workers AI allowance.
[ai]
binding = "AI"

# Run the background task queue every minute so agents keep working with the app closed.
[triggers]
crons = ["* * * * *"]

# Secrets (set via the deploy workflow or `wrangler secret put <NAME>`):
#   NVIDIA_API_KEY          - https://build.nvidia.com (image generation)
#   SUPABASE_SERVICE_KEY    - Supabase service role key (cron reads/writes, bypassing RLS)
#   GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET - Gmail sign-in
#   GROQ_API_KEY            - (optional)
#
# Vars below are safe to commit:
[vars]
ALLOWED_ORIGIN = "*"
APP_REDIRECT = "https://riporipoteam-ctrl.github.io/RipoPlan/oauth/"
SUPABASE_URL = "https://xbwhvkzgbnyqsjplbyox.supabase.co"
AGENT_MODEL = "@cf/zai-org/glm-5.2"

# Real headless-Chrome live browser for every agent (optional, Workers Paid).
# Uncomment, run `npm i @cloudflare/puppeteer`, swap liveBrowse(), then redeploy.
# [browser]
# binding = "BROWSER"
